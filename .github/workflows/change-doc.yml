name: Generate Change Documentation on PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  document:
    if: github.event.pull_request.merged == true && github.head_ref != 'docs/codebase-state'
    runs-on: ubuntu-latest
    steps:
      - name: Call PR Analysis API
        env:
          PR_ANALYSIS_API_URL: ${{ vars.PR_ANALYSIS_API_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          curl -X POST "${{ env.PR_ANALYSIS_API_URL }}/analyze-pr" \
            -H "Content-Type: application/json" \
            -d '{
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "pr_number": ${{ github.event.pull_request.number }},
              "run_id": ${{ github.run_id }},
              "github_token": "${{ env.GITHUB_TOKEN }}",
              "run_ai": false
            }' \
            -o response.json
      - name: Create markdown file
        run: |
          if [ "$(jq '.change_documentation' response.json)" != "false" ]; then
            jq -r '.change_documentation' response.json > change_documentation.md
          fi

      - name: Upload artifact
        if: ${{ hashFiles('change_documentation.md') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: change_documentation-pr-${{ github.event.pull_request.number }}
          path: change_documentation.md
      
      - name: Publish summary
        if: ${{ hashFiles('change_documentation.md') != '' }}
        run: |
          cat change_documentation.md >> $GITHUB_STEP_SUMMARY
